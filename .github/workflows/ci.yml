name: AAHP CI

on:
  push:
    branches: [main]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: npm ci

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: ShellCheck scripts
        run: |
          shellcheck scripts/_aahp-lib.sh
          shellcheck -x -P scripts/ scripts/aahp-manifest.sh
          shellcheck -x -P scripts/ scripts/aahp-migrate-v2.sh
          shellcheck scripts/lint-handoff.sh
          shellcheck -x -P scripts/ scripts/verify-handoff.sh
          shellcheck -x -P scripts/ scripts/aahp-archive.sh
          shellcheck scripts/install-hooks.sh
          shellcheck scripts/hooks/pre-commit
          shellcheck scripts/hooks/pre-push
          shellcheck tests/run.sh
          shellcheck tests/test_helper.bash

      - name: Compile Python validators
        run: python -m py_compile scripts/validate-pii-allowlist.py

      - name: Lint handoff files
        run: bash scripts/lint-handoff.sh .

      - name: Validate MANIFEST.json against schema
        run: |
          npm install --no-save ajv-cli ajv-formats
          npx ajv-cli validate --spec=draft2020 -c ajv-formats -s schema/aahp-manifest.schema.json -d .ai/handoff/MANIFEST.json

      - name: Run bats tests
        run: npm test

  publish:
    name: Publish to npm
    needs: lint-and-validate
    runs-on: ubuntu-latest
    if: (startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '.')) || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
      - run: npm ci
      - run: npm run build --if-present
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest
      - name: Publish to npm (OIDC trusted publishing, no token)
        run: npm publish --access public --provenance

  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '.')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        run: gh release create "$GITHUB_REF_NAME" --title "AAHP $GITHUB_REF_NAME" --notes "Release $GITHUB_REF_NAME. See the README changelog."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
